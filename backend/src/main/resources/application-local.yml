# 로컬 개발용 설정 (H2 인메모리)
spring:
  datasource:
    url: jdbc:h2:mem:moneylog;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update   # 엔티티 기준으로 테이블 자동 생성/갱신 (배포용 MySQL은 validate 예정, 1-10)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
