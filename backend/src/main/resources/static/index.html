<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MoneyLog - 로그인</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container narrow">
    <h1>MoneyLog</h1>
    <p class="subtitle">나만의 가계부</p>

    <div id="login-section">
        <h2>로그인</h2>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="이메일" required>
            <input type="password" id="login-password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
        <p class="switch">계정이 없으신가요? <a href="#" onclick="toggleForms(); return false;">회원가입</a></p>
    </div>

    <div id="signup-section" style="display:none;">
        <h2>회원가입</h2>
        <form id="signup-form">
            <input type="email" id="signup-email" placeholder="이메일" required>
            <input type="password" id="signup-password" placeholder="비밀번호 (8자 이상)" required minlength="8">
            <input type="text" id="signup-nickname" placeholder="닉네임" required>
            <button type="submit">회원가입</button>
        </form>
        <p class="switch">이미 계정이 있으신가요? <a href="#" onclick="toggleForms(); return false;">로그인</a></p>
    </div>

    <p id="error-message" class="error" style="display:none;"></p>
</div>
<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
