<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MoneyLog - 월별 통계</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div class="container">
    <nav>
        <h1>MoneyLog</h1>
        <div class="nav-links">
            <a href="transactions.html">거래내역</a>
            <button id="logout-btn" class="secondary">로그아웃</button>
        </div>
    </nav>

    <h2>이번 달 통계</h2>

    <section class="summary-cards">
        <div class="card">
            <span>총수입</span>
            <strong id="stat-income">0원</strong>
        </div>
        <div class="card">
            <span>총지출</span>
            <strong id="stat-expense">0원</strong>
        </div>
        <div class="card">
            <span>잔액</span>
            <strong id="stat-balance">0원</strong>
        </div>
    </section>

    <section class="card-section">
        <h3>카테고리별 지출</h3>
        <canvas id="category-chart" width="360" height="320"></canvas>
    </section>

    <p id="error-message" class="error" style="display:none;"></p>
</div>
<script src="js/api.js"></script>
<script src="js/statistics.js"></script>
</body>
</html>
