# 배포용 설정 (MySQL, 환경변수로 자격증명 주입 - docker-compose.yml / GitHub Actions Secrets 참고)
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:moneylog}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:moneylog}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 마이그레이션 도구(Flyway 등) 없이 진행하는 캡스톤 규모라 update로 둔다.
      # 스키마가 안정화된 뒤에는 validate + 별도 DDL 관리로 전환하는 것을 권장.
      ddl-auto: update
    show-sql: false
