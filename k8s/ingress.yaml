# nginx-ingress-controller가 클러스터에 설치되어 있어야 한다.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moneylog-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: moneylog.example.com   # 실제 도메인으로 교체
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moneylog-app
                port:
                  number: 80
